<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        function factorial(n) {
            if (n === 0 || n === 1) {
                return 1;
            } else {
                return n * factorial(n - 1);
            }
        }

        let number = prompt("Enter a number to calculate its factorial:"); // Change this number to calculate the factorial of a different number
        number = parseInt(number);
        const result = factorial(number);
        document.write(`Factorial of ${number} is ${result}`);
    </script>

</body>

</html>
