<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10th Grade Quiz App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Practice Quiz</p>
        <h1>10th Grade Quiz App</h1>
        <p class="subtitle">
          Test your knowledge in Math, General Knowledge, and English Grammar.
          Each load gives you 10 questions from a full set of 100.
        </p>
      </header>

      <section class="controls">
        <p id="batchInfo">Loading quiz batch...</p>
        <button id="reloadBtn" type="button">Load another 10 questions</button>
      </section>

      <form id="quizForm">
        <div id="questions" class="questions"></div>
        <button class="submit-btn" type="submit">Submit Answers</button>
      </form>

      <section id="result" class="result-card" hidden></section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
