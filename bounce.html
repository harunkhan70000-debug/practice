<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        .box {
            background-color: aqua;
            height: 400px;
            width: 600px;
        }

        .ball {
            background-color: red;
            height: 40px;
            width: 40px;
            border-radius: 60px;
            position: relative;
            top: 360px;
            animation:  x 1s linear infinite alternate, 
            y 3s ease-out infinite ;
        }

        @keyframes x {
           from{top: 360px;}
            to{top: 0;}
        }
        @keyframes y {
           from{left: 0px;}
            to{left: 320px;}
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="ball"></div>
    </div>

</body>

</html>
