<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            width: min(100%, 480px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
            text-align: center;
        }

        .output-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .output-row input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #111827;
            color: #f8fafc;
            font-size: 16px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .primary {
            background: #3b82f6;
            color: white;
        }

        .secondary {
            background: #334155;
            color: white;
        }

        .controls {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            padding: 10px 12px;
            border-radius: 10px;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 6px;
        }

        .status {
            margin-top: 12px;
            min-height: 20px;
            color: #93c5fd;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Random Password Generator</h1>

        <div class="output-row">
            <input id="passwordOutput" type="text" readonly value="Generate a password">
            <button class="secondary" id="copyBtn" type="button">Copy</button>
        </div>

        <button class="primary" id="generateBtn" type="button">Generate Password</button>

        <div class="controls">
            <div class="row">
                <label for="length">Password length: <strong id="lengthValue">12</strong></label>
                <input id="length" type="range" min="6" max="30" value="12">
            </div>

            <label class="row">
                <span>Include lowercase</span>
                <input id="lowercase" type="checkbox" checked>
            </label>

            <label class="row">
                <span>Include uppercase</span>
                <input id="uppercase" type="checkbox" checked>
            </label>

            <label class="row">
                <span>Include numbers</span>
                <input id="numbers" type="checkbox" checked>
            </label>

            <label class="row">
                <span>Include symbols</span>
                <input id="symbols" type="checkbox" checked>
            </label>
        </div>

        <div class="status" id="statusText">Choose your settings and generate a secure password.</div>
    </div>

    <script>
        const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
        const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numberChars = '0123456789';
        const symbolChars = '!@#$%^&*()-_=+[]{}<>?/';

        const passwordOutput = document.getElementById('passwordOutput');
        const lengthInput = document.getElementById('length');
        const lengthValue = document.getElementById('lengthValue');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusText = document.getElementById('statusText');

        lengthInput.addEventListener('input', () => {
            lengthValue.textContent = lengthInput.value;
        });

        function getSelectedCharacters() {
            let chars = '';
            if (document.getElementById('lowercase').checked) chars += lowercaseChars;
            if (document.getElementById('uppercase').checked) chars += uppercaseChars;
            if (document.getElementById('numbers').checked) chars += numberChars;
            if (document.getElementById('symbols').checked) chars += symbolChars;
            return chars;
        }

        function generatePassword(length, chars) {
            if (!chars) {
                statusText.textContent = 'Select at least one character type.';
                return '';
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }
            return password;
        }

        function generate() {
            const length = Number(lengthInput.value);
            const chars = getSelectedCharacters();
            const password = generatePassword(length, chars);

            if (password) {
                passwordOutput.value = password;
                statusText.textContent = 'Password generated successfully.';
            }
        }

        generateBtn.addEventListener('click', generate);

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(passwordOutput.value);
                statusText.textContent = 'Password copied to clipboard.';
            } catch (err) {
                statusText.textContent = 'Copy failed. Please copy manually.';
            }
        });

        generate();
    </script>
</body>
</html>
